name: coverage-ci

on:
  push:
    paths-ignore: ["README.md"]

  pull_request:
    branches: [master]

env:
  BUILD_TYPE: Debug

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install gcov
        run: |
          sudo apt-get update
          sudo apt-get install g++ lcov

      - uses: actions/checkout@v2

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          -DDSPLIB_BUILD_TESTS=ON
          -DDSPLIB_COVERAGE_ENABLED=ON
        env:
          CXX: g++

      - name: Build
        run: cmake --build ${{github.workspace}}/build

      - name: Test (coverage)
        working-directory: ${{github.workspace}}
        run: |
          lcov -c -i -d . -o coverage_base.info --no-external -q
          ./build/tests/dsplib-test
          lcov -c -d . -o coverage_test.info --no-external -q
          lcov -a coverage_base.info -a coverage_test.info -o coverage.info -q
          lcov --remove coverage.info "*/tests/*" -o coverage.info -q
          lcov --summary coverage.info
